# nginx server block для nr.gnld.ru — Nastya Orchestrator
# ВАЖНО: HTTP listen — IP-specific (как в /etc/nginx/listen.conf)
# ВАЖНО: HTTPS listen — GENERIC без IP! (IP-specific ломает SSL остальных сайтов)

# HTTP → HTTPS редирект
server {
    listen 185.93.111.88:80;
    server_name nr.gnld.ru;
    return 301 https://$host$request_uri;
}

server {
    # GENERIC listen — БЕЗ IP! Иначе станет default server и сломает SSL других сайтов
    listen 443 ssl http2;
    server_name nr.gnld.ru;

    # SSL-сертификаты (заполняет certbot)
    ssl_certificate /etc/letsencrypt/live/nr.gnld.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nr.gnld.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Basic Auth — единственный пользователь Настя
    auth_basic "Nastya Orchestrator";
    auth_basic_user_file /etc/nginx/.htpasswd-nastya;

    # Frontend — статика Vite build
    root /opt/nastya-orch/frontend/dist;
    index index.html;

    # SPA-роутинг: все неизвестные пути отдают index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # SSE-эндпоинты — отдельный блок ПЕРЕД /api/, буферизация отключена!
    # Блок более специфичный → перехватывает /api/events/ раньше чем /api/
    location /api/events/ {
        proxy_pass http://127.0.0.1:8781;

        # Отключить все виды буферизации для Server-Sent Events
        proxy_buffering off;
        proxy_cache off;

        # Долгий таймаут — SSE-соединение живёт часами
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # HTTP/1.1 + отключить keep-alive chunked — нужно для SSE
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        chunked_transfer_encoding off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Отключить gzip для SSE — мешает потоковой передаче
        gzip off;
    }

    # Загрузка документов — увеличенный лимит размера
    location /api/documents/ {
        client_max_body_size 50m;

        proxy_pass http://127.0.0.1:8781;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Таймаут для больших файлов
        proxy_read_timeout 120s;
    }

    # Общий API — proxy to uvicorn на порту 8781
    # Worker-эндпоинты используют Bearer token, но basic auth всё равно
    # нужен для запросов из браузера (nginx проверяет первым)
    location /api/ {
        proxy_pass http://127.0.0.1:8781;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Логи
    access_log /var/log/nginx/nr.gnld.ru.access.log;
    error_log /var/log/nginx/nr.gnld.ru.error.log;
}
