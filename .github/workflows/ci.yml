name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - main
      - master

# Отменяем предыдущий запуск для той же ветки — экономим минуты
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─── Python: линтер ─────────────────────────────────────────────────
  lint-python:
    name: Lint Python (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install lint tools
        run: pip install ruff mypy

      - name: ruff check
        # --exit-zero — мягкий режим: warnings не блокируют. Цель — видимость, не блок.
        # После стабилизации кодовой базы можно убрать --exit-zero.
        run: ruff check backend/ worker/ tests/ --exit-zero

      - name: mypy check
        # Тоже мягкий: игнорируем отсутствующие stub-ы, не блокируем.
        run: mypy backend/ worker/ --ignore-missing-imports --no-error-summary || true

  # ─── Python: тесты ──────────────────────────────────────────────────
  test-python:
    name: Test Python (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        # Блокирующий — красные тесты не пропускаем
        run: python -m pytest tests/ -v --tb=short

  # ─── Frontend: линтер + type-check ──────────────────────────────────
  lint-frontend:
    name: Lint Frontend (tsc)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript type-check
        # Блокирующий — типы должны быть чистыми
        working-directory: frontend
        run: npx tsc --noEmit

      # eslint не настроен в devDependencies — пропускаем

  # ─── Frontend: сборка ────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint-frontend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        # Блокирующий — сломанный билд = регрессия
        working-directory: frontend
        run: npm run build

      # Артефакт не сохраняем — только проверка что билд не упал

  # ─── Rust: линтер ────────────────────────────────────────────────────
  lint-rust:
    name: Lint Rust (clippy + fmt)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo target
        uses: actions/cache@v4
        with:
          path: src-tauri/target
          key: ${{ runner.os }}-cargo-target-lint-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-lint-

      - name: cargo clippy
        # Строго: -D warnings — код маленький, должен быть чистым
        working-directory: src-tauri
        run: cargo clippy --no-deps --all-targets -- -D warnings

      - name: cargo fmt check
        working-directory: src-tauri
        run: cargo fmt --check

  # ─── Rust: cargo check ───────────────────────────────────────────────
  build-rust:
    name: Build Rust (cargo check)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo target
        uses: actions/cache@v4
        with:
          path: src-tauri/target
          key: ${{ runner.os }}-cargo-target-check-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-check-

      - name: cargo check
        # cargo check — не полный билд, но ловит все ошибки компиляции
        working-directory: src-tauri
        run: cargo check --all-targets
