name: Release Windows Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      draft:
        description: 'Publish as draft release (only applies when tag is pushed)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Windows Release
    runs-on: windows-latest
    timeout-minutes: 60

    env:
      PYTHON_VERSION: '3.12'
      NODE_VERSION: '20'
      # Подтягиваем secrets в job-level env, чтобы `if:` шагов мог их проверить.
      # Без этого условие `env.TAURI_SIGNING_PRIVATE_KEY != ''` всегда было бы пустым.
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Node + фронт идут ПЕРВЫМИ — backend.spec вшивает frontend/dist внутрь .exe,
      # значит фронт должен быть собран ДО PyInstaller.
      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest smoke suite
        # Gate перед билдом — если тесты красные, релиз не публикуется.
        # Тот же набор что в dev-gui Release workflow.
        run: python -m pytest -q --tb=line

      - name: Create .secrets.json from GitHub Secrets
        # Прошивается в worker.exe/backend.exe через PyInstaller.
        # Файл в .gitignore — в репе его нет, только в билд-артефакте.
        # Если AITUNNEL_API_KEY не задан — файл не создаётся,
        # Gemini OCR 3-го уровня не работает (но markitdown+pdfminer покрывают 80%).
        shell: pwsh
        env:
          AITUNNEL_API_KEY: ${{ secrets.AITUNNEL_API_KEY }}
        run: |
          if (-not $env:AITUNNEL_API_KEY) {
            Write-Warning "AITUNNEL_API_KEY secret не задан — .secrets.json не создан. Gemini OCR не прошивается в билд."
            exit 0
          }
          $secrets = @{
            aitunnel_api_key = $env:AITUNNEL_API_KEY
          }
          $secrets | ConvertTo-Json | Out-File -Encoding utf8 -NoNewline .secrets.json
          Write-Host ".secrets.json создан (aitunnel_api_key длиной $($env:AITUNNEL_API_KEY.Length))"

      - name: Build backend with PyInstaller
        run: pyinstaller build/backend.spec --noconfirm --distpath build/dist --workpath build/work

      - name: Build worker with PyInstaller
        run: pyinstaller build/worker.spec --noconfirm --distpath build/dist --workpath build/work

      - name: Prepare Tauri sidecar binaries directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null

      - name: Copy backend.exe as Tauri sidecar
        shell: pwsh
        run: Copy-Item -Path build/dist/nastya-backend.exe -Destination src-tauri/binaries/nastya-backend-x86_64-pc-windows-msvc.exe -Force

      - name: Copy worker.exe as Tauri sidecar
        shell: pwsh
        run: Copy-Item -Path build/dist/nastya-worker.exe -Destination src-tauri/binaries/nastya-worker-x86_64-pc-windows-msvc.exe -Force

      - name: Download opera-proxy sidecar
        # opera-proxy — третий sidecar (VPN tunnel), готовый бинарник из Alexey71/opera-proxy.
        # В .gitignore → в репо его нет → качаем свежий релиз под Windows x86_64.
        # Имя должно совпадать с externalBin в tauri.conf.json + platform suffix.
        shell: pwsh
        run: |
          $url = "https://github.com/Alexey71/opera-proxy/releases/latest/download/opera-proxy.windows-amd64.exe"
          $dest = "src-tauri/binaries/opera-proxy-x86_64-pc-windows-msvc.exe"
          Write-Host "Downloading opera-proxy from $url"
          Invoke-WebRequest -Uri $url -OutFile $dest -UseBasicParsing
          $size = (Get-Item $dest).Length
          Write-Host "Downloaded $size bytes to $dest"
          if ($size -lt 100000) {
            Write-Error "opera-proxy binary suspiciously small ($size bytes) — download failed?"
            exit 1
          }

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo target
        uses: actions/cache@v4
        with:
          path: src-tauri/target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Build Tauri application (signed)
        # TAURI_SIGNING_PRIVATE_KEY (из job-level env) = base64-encoded minisign key.
        # Формат: base64(comment_line + "\n" + key_data_line).
        # Tauri CLI САМА декодирует base64 → получает raw minisign format → подписывает.
        # НЕ нужно декодировать вручную — Tauri ожидает именно base64.
        run: cargo tauri build

      - name: Collect release artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-artifacts | Out-Null
          Copy-Item -Path build/dist/nastya-backend.exe -Destination release-artifacts/ -Force
          Copy-Item -Path build/dist/nastya-worker.exe -Destination release-artifacts/ -Force
          # Tauri v2 для NSIS target генерит installer (-setup.exe) и подпись
          # (-setup.exe.sig). Старый формат .nsis.zip больше не используется.
          Get-ChildItem -Path src-tauri/target/release/bundle/nsis -Include *.exe,*.exe.sig -Recurse -ErrorAction SilentlyContinue | ForEach-Object {
            Copy-Item -Path $_.FullName -Destination release-artifacts/ -Force
          }

      - name: Generate latest.json for Tauri Updater
        # tauri.conf.json.updater.endpoints указывает на
        # https://github.com/.../releases/latest/download/latest.json
        # Этот файл — манифест для updater: версия, ссылки, подпись.
        # Без него приложение Насти получит 404 при проверке апдейтов.
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          $notes = "Release $tag"
          $pubDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")

          # Tauri v2 NSIS: installer -setup.exe + подпись -setup.exe.sig
          $exeFile = Get-ChildItem -Path release-artifacts -Filter *-setup.exe | Select-Object -First 1
          $sigFile = Get-ChildItem -Path release-artifacts -Filter *-setup.exe.sig | Select-Object -First 1

          if (-not $exeFile -or -not $sigFile) {
            Write-Error "❌ -setup.exe или -setup.exe.sig не найдены — Tauri не подписал updater-артефакты."
            Write-Error "Вероятная причина: TAURI_SIGNING_PRIVATE_KEY / _PASSWORD в GitHub Secrets невалидны."
            Write-Error "Локально проверь связку: .\scripts\setup-signing.ps1"
            exit 1
          }

          $signature = Get-Content -Path $sigFile.FullName -Raw
          $downloadUrl = "https://github.com/${{ github.repository }}/releases/download/$tag/$($exeFile.Name)"

          $manifest = @{
            version = $version
            notes = $notes
            pub_date = $pubDate
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature
                url = $downloadUrl
              }
            }
          }

          $manifest | ConvertTo-Json -Depth 10 | Out-File -Encoding utf8 release-artifacts/latest.json
          Write-Host "Generated latest.json:"
          Get-Content release-artifacts/latest.json

      - name: Verify updater artifacts (release tags only)
        # Release без updater-артефактов ломает авто-обновление у Насти.
        # Lesson #13 — fail-fast вместо silent skip.
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $exe  = Get-ChildItem -Path release-artifacts -Filter *-setup.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          $sig  = Get-ChildItem -Path release-artifacts -Filter *-setup.exe.sig -ErrorAction SilentlyContinue | Select-Object -First 1
          $json = Get-ChildItem -Path release-artifacts -Filter latest.json -ErrorAction SilentlyContinue | Select-Object -First 1
          $missing = @()
          if (-not $exe)  { $missing += "-setup.exe" }
          if (-not $sig)  { $missing += "-setup.exe.sig" }
          if (-not $json) { $missing += "latest.json" }
          if ($missing.Count -gt 0) {
            Write-Error "❌ Отсутствуют updater-артефакты: $($missing -join ', ')"
            Write-Error "Tauri auto-updater не заработает. Проверь TAURI_SIGNING_PRIVATE_KEY / _PASSWORD."
            exit 1
          }
          Write-Host "✓ Updater-артефакты: $($exe.Name), $($sig.Name), $($json.Name)"

      - name: Generate SHA256 checksums
        shell: pwsh
        working-directory: release-artifacts
        run: |
          Get-ChildItem -Filter *.exe | ForEach-Object {
            $hash = (Get-FileHash -Algorithm SHA256 $_.FullName).Hash.ToLower()
            "$hash  $($_.Name)" | Out-File -Append -Encoding ascii SHA256SUMS.txt
          }
          Get-Content SHA256SUMS.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nastya-windows-release
          path: release-artifacts/
          retention-days: 14

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft == 'true' }}
          generate_release_notes: true
          files: |
            release-artifacts/*.exe
            release-artifacts/*.exe.sig
            release-artifacts/latest.json
            release-artifacts/SHA256SUMS.txt
