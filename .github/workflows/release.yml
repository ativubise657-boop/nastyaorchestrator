name: Release Windows Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      draft:
        description: 'Publish as draft release (only applies when tag is pushed)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

jobs:
  build:
    name: Build Windows Release
    runs-on: windows-latest

    env:
      PYTHON_VERSION: '3.12'
      NODE_VERSION: '20'
      # Подтягиваем secrets в job-level env, чтобы `if:` шагов мог их проверить.
      # Без этого условие `env.TAURI_SIGNING_PRIVATE_KEY != ''` всегда было бы пустым.
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Node + фронт идут ПЕРВЫМИ — backend.spec вшивает frontend/dist внутрь .exe,
      # значит фронт должен быть собран ДО PyInstaller.
      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest smoke suite
        # Gate перед билдом — если тесты красные, релиз не публикуется.
        # Тот же набор что в dev-gui Release workflow.
        run: python -m pytest -q --tb=line

      - name: Build backend with PyInstaller
        run: pyinstaller build/backend.spec --noconfirm --distpath build/dist --workpath build/work

      - name: Build worker with PyInstaller
        run: pyinstaller build/worker.spec --noconfirm --distpath build/dist --workpath build/work

      - name: Prepare Tauri sidecar binaries directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null

      - name: Copy backend.exe as Tauri sidecar
        shell: pwsh
        run: Copy-Item -Path build/dist/nastya-backend.exe -Destination src-tauri/binaries/nastya-backend-x86_64-pc-windows-msvc.exe -Force

      - name: Copy worker.exe as Tauri sidecar
        shell: pwsh
        run: Copy-Item -Path build/dist/nastya-worker.exe -Destination src-tauri/binaries/nastya-worker-x86_64-pc-windows-msvc.exe -Force

      - name: Download opera-proxy sidecar
        # opera-proxy — третий sidecar (VPN tunnel), готовый бинарник из Alexey71/opera-proxy.
        # В .gitignore → в репо его нет → качаем свежий релиз под Windows x86_64.
        # Имя должно совпадать с externalBin в tauri.conf.json + platform suffix.
        shell: pwsh
        run: |
          $url = "https://github.com/Alexey71/opera-proxy/releases/latest/download/opera-proxy.windows-amd64.exe"
          $dest = "src-tauri/binaries/opera-proxy-x86_64-pc-windows-msvc.exe"
          Write-Host "Downloading opera-proxy from $url"
          Invoke-WebRequest -Uri $url -OutFile $dest -UseBasicParsing
          $size = (Get-Item $dest).Length
          Write-Host "Downloaded $size bytes to $dest"
          if ($size -lt 100000) {
            Write-Error "opera-proxy binary suspiciously small ($size bytes) — download failed?"
            exit 1
          }

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo target
        uses: actions/cache@v4
        with:
          path: src-tauri/target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Decode signing key (base64 → raw minisign format)
        # Файл .tauri/nastya.key хранится в base64-кодированном виде.
        # GitHub Secret содержит base64(raw_key). Tauri CLI ожидает raw_key
        # (две строки: "untrusted comment: ..." + base64-encoded secret).
        # Декодируем и прокидываем через GITHUB_ENV (multiline delimiter).
        if: env.TAURI_SIGNING_PRIVATE_KEY != ''
        shell: pwsh
        run: |
          try {
            $decoded = [System.Text.Encoding]::UTF8.GetString(
              [System.Convert]::FromBase64String($env:TAURI_SIGNING_PRIVATE_KEY)
            ).Trim()
            $lineCount = ($decoded -split "`n").Count
            Write-Host "Signing key decoded: $lineCount lines"
            # Multiline env через heredoc delimiter
            "TAURI_SIGNING_PRIVATE_KEY<<SIGNING_KEY_EOF" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8
            $decoded | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8
            "SIGNING_KEY_EOF" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8
          } catch {
            Write-Warning "Failed to decode signing key as base64, using as-is (may already be raw format)"
          }

      - name: Build Tauri application
        # TAURI_SIGNING_PRIVATE_KEY (уже декодированный) + PASSWORD в job-level env.
        # cargo tauri build подпишет артефакты и сгенерирует .nsis.zip + .nsis.zip.sig.
        run: cargo tauri build

      - name: Collect release artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-artifacts | Out-Null
          Copy-Item -Path build/dist/nastya-backend.exe -Destination release-artifacts/ -Force
          Copy-Item -Path build/dist/nastya-worker.exe -Destination release-artifacts/ -Force
          # Забираем ВСЁ из bundle/nsis: installer (.exe), updater дельта (.nsis.zip),
          # подпись для updater (.nsis.zip.sig). Tauri Updater ищет всё это в release.
          Get-ChildItem -Path src-tauri/target/release/bundle/nsis -Include *.exe,*.nsis.zip,*.nsis.zip.sig -Recurse -ErrorAction SilentlyContinue | ForEach-Object {
            Copy-Item -Path $_.FullName -Destination release-artifacts/ -Force
          }

      - name: Generate latest.json for Tauri Updater
        # tauri.conf.json.updater.endpoints указывает на
        # https://github.com/.../releases/latest/download/latest.json
        # Этот файл — манифест для updater: версия, ссылки, подпись.
        # Без него приложение Насти получит 404 при проверке апдейтов.
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          $notes = "Release $tag"
          $pubDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")

          # Находим .nsis.zip и .sig файлы
          $zipFile = Get-ChildItem -Path release-artifacts -Filter *.nsis.zip | Select-Object -First 1
          $sigFile = Get-ChildItem -Path release-artifacts -Filter *.nsis.zip.sig | Select-Object -First 1

          if (-not $zipFile -or -not $sigFile) {
            Write-Warning "nsis.zip or .sig not found — updater latest.json will be skipped (билд без TAURI_SIGNING_PRIVATE_KEY?)"
            exit 0
          }

          $signature = Get-Content -Path $sigFile.FullName -Raw
          $downloadUrl = "https://github.com/${{ github.repository }}/releases/download/$tag/$($zipFile.Name)"

          $manifest = @{
            version = $version
            notes = $notes
            pub_date = $pubDate
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature
                url = $downloadUrl
              }
            }
          }

          $manifest | ConvertTo-Json -Depth 10 | Out-File -Encoding utf8 release-artifacts/latest.json
          Write-Host "Generated latest.json:"
          Get-Content release-artifacts/latest.json

      - name: Generate SHA256 checksums
        shell: pwsh
        working-directory: release-artifacts
        run: |
          Get-ChildItem -Filter *.exe | ForEach-Object {
            $hash = (Get-FileHash -Algorithm SHA256 $_.FullName).Hash.ToLower()
            "$hash  $($_.Name)" | Out-File -Append -Encoding ascii SHA256SUMS.txt
          }
          Get-Content SHA256SUMS.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nastya-windows-release
          path: release-artifacts/
          retention-days: 14

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft == 'true' }}
          generate_release_notes: true
          files: |
            release-artifacts/*.exe
            release-artifacts/*.nsis.zip
            release-artifacts/*.nsis.zip.sig
            release-artifacts/latest.json
            release-artifacts/SHA256SUMS.txt
